  kafka{{BROKER_INDEX}}:
    image: {{KAFKA_IMAGE}}
    hostname: kafka{{BROKER_INDEX}}
    ports:
      - "{{EXTERNAL_PORT}}:{{EXTERNAL_PORT}}"
    environment:
      KAFKA_NODE_ID: {{BROKER_INDEX}}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://kafka{{BROKER_INDEX}}:9092,EXTERNAL://0.0.0.0:{{EXTERNAL_PORT}},CONTROLLER://kafka{{BROKER_INDEX}}:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka{{BROKER_INDEX}}:9092,EXTERNAL://localhost:{{EXTERNAL_PORT}}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: {{QUORUM_VOTERS}}
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: {{REPLICATION_FACTOR}}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: {{REPLICATION_FACTOR}}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: {{CLUSTER_ID}}